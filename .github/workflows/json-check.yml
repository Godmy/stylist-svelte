name: Pipeline V3 Check

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  pipeline-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run pipeline + CI checks
        run: yarn ci:pipeline

      - name: Run type checks
        run: yarn tsc && yarn check

      - name: Ensure generated files are committed
        run: git diff --exit-code -- src/lib/json src/lib/svg/icons/icon-registry.ts scripts/manifest.json
